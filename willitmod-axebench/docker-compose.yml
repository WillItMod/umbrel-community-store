version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: willitmod-axebench_server_1
      APP_PORT: 5000

  server:
    image: ghcr.io/willitmod/axebench-release:v3.0.1-alpha@sha256:3c0f2ffee49dbada14d313ef4fda12876b1f4fa85ef1b11283aad2692a52b979
    restart: on-failure
    stop_grace_period: 30s
    init: true
    environment:
      AXE_HOST: 0.0.0.0
      AXE_PORT: 5000
      HOME: /data
      # IMPORTANT: Do not grant paid tiers by default.
      # AxeBench's default is to use a hosted licensing server; disabling it keeps the app in free mode
      # unless the operator explicitly configures licensing.
      AXEBENCH_LICENSE_SERVER: disabled
    volumes:
      - ${APP_DATA_DIR}/data:/data
